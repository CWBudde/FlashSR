name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Build a native binary on each target platform.
  # cgo (ORT binding) requires a native C compiler, so we run one job per OS.
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" \
            -o flashsr${{ matrix.ext }} \
            ./cmd/flashsr

      - name: Package archive
        shell: bash
        run: |
          NAME="flashsr_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp flashsr${{ matrix.ext }} "dist/${NAME}/"
          cp LICENSE NOTICE THIRD_PARTY_NOTICES.md README.md "dist/${NAME}/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -r "${NAME}.zip" "${NAME}")
          else
            (cd dist && tar czf "${NAME}.tar.gz" "${NAME}")
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashsr_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  # Download all platform artifacts and publish a GitHub release.
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt || sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          body: |
            ## Prerequisites

            FlashSR requires `libonnxruntime` as a shared library at runtime.

            1. Download the matching ONNX Runtime release from https://github.com/microsoft/onnxruntime/releases
            2. Set `FLASHSR_ORT_LIB=/path/to/libonnxruntime.so` (Linux) or `libonnxruntime.dylib` (macOS)
            3. Run `flashsr doctor` to verify your setup

            See `THIRD_PARTY_NOTICES.md` in the archive for license information.
