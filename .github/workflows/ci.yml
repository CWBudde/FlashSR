name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.23", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Golden tests
        if: ${{ env.FLASHSR_ORT_LIB != '' }}
        run: go test -tags golden ./...
        env:
          FLASHSR_ORT_LIB: ${{ secrets.FLASHSR_ORT_LIB }}
          FLASHSR_MODEL_PATH: ${{ secrets.FLASHSR_MODEL_PATH }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.63
