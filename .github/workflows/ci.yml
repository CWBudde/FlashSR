name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24", "1.25"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Golden tests
        if: ${{ secrets.FLASHSR_ORT_LIB != '' }}
        run: go test -tags golden -v ./...
        env:
          FLASHSR_ORT_LIB: ${{ secrets.FLASHSR_ORT_LIB }}
          FLASHSR_MODEL_PATH: ${{ secrets.FLASHSR_MODEL_PATH }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
