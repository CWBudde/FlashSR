run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - gocritic

linters-settings:
  goimports:
    local-prefixes: github.com/MeKo-Christian/flashsr-go

issues:
  exclude-rules:
    # Allow TODO comments in placeholder implementations.
    - text: "TODO"
      linters: [godot]
